name: Bug Report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Register the theme plugin on a panel
        2. Navigate to ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: theme-version
    attributes:
      label: Theme version
      placeholder: "2.3.0"
    validations:
      required: true

  - type: input
    id: filament-version
    attributes:
      label: Filament version
      placeholder: "4.3.0"
    validations:
      required: true

  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: "12.8.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4.1"
    validations:
      required: true

  - type: dropdown
    id: integration-mode
    attributes:
      label: Integration mode
      options:
        - Asset registration (default)
        - Vite theme integration
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.
    validations:
      required: false
