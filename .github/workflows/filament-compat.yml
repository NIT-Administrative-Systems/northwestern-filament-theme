name: Filament Compatibility Check

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  check-latest:
    name: Check Against Latest Filament ${{ matrix.filament }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        filament: ["^4.0", "^5.0"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install with Filament ${{ matrix.filament }}
        run: |
          composer require filament/filament:${{ matrix.filament }} --no-interaction --prefer-dist

      - name: Run Selector Integrity Test
        run: ./vendor/bin/pest --filter=FilamentSelectorIntegrity
