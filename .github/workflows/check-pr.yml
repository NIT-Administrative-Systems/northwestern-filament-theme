name: Check PR

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "24"
  PNPM_VERSION: "10.x.x"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-format:
    name: Lint, Format & Analyse
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: /tmp/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('rector.php', 'composer.json') }}
          restore-keys: |
            ${{ runner.os }}-rector-

      - name: Pint Cache
        uses: actions/cache@v5
        with:
          path: ./storage/pint.cache
          key: ${{ runner.os }}-pint-${{ hashFiles('pint.json', 'composer.json') }}
          restore-keys: |
            ${{ runner.os }}-pint-

      - name: Run Rector
        run: composer rector:dry

      - name: Run Laravel Pint
        run: composer format:check

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Node Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run Prettier
        run: pnpm format:check

      - name: Run Stylelint
        run: pnpm lint:css

      - name: Check dist/ is up to date
        run: pnpm build:css:check

      - name: PHPStan Result Cache
        uses: actions/cache@v5
        with:
          path: /tmp/phpstan
          key: phpstan-results-${{ hashFiles('phpstan.neon', 'composer.json') }}
          restore-keys: |
            phpstan-results-${{ hashFiles('phpstan.neon') }}-
            phpstan-results-

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress --error-format=checkstyle > phpstan-report.xml

      - name: Publish PHPStan Report
        if: github.actor != 'dependabot[bot]' && always()
        uses: lcollins/checkstyle-github-action@v3.2.0
        with:
          name: "PHPStan Analysis Report"
          path: "phpstan-report.xml"
          title: "PHPStan Analysis Report"

  tests:
    name: Tests — PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        include:
          - php: "8.3"
            laravel: "12"
            testbench: "10.*"
          - php: "8.4"
            laravel: "12"
            testbench: "10.*"
          - php: "8.4"
            laravel: "13"
            testbench: "11.*"
          - php: "8.5"
            laravel: "13"
            testbench: "11.*"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install Dependencies
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: PHPUnit Cache
        uses: actions/cache@v5
        with:
          path: ./.phpunit.cache
          key: ${{ runner.os }}-phpunit-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('phpunit.xml', 'composer.json') }}
          restore-keys: |
            ${{ runner.os }}-phpunit-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Run Pest
        run: ./vendor/bin/pest --cache-result --cache-directory=.phpunit.cache
