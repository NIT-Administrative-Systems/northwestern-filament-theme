name: Percy Visual Review

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: percy-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.2"
  NODE_VERSION: "24"

jobs:
  percy:
    name: Visual Snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Composer Dependencies Cache
        uses: actions/cache@v5
        with:
          path: demo/vendor
          key: ${{ runner.os }}-demo-vendor-${{ hashFiles('demo/composer.json') }}

      - name: Install Composer Dependencies
        working-directory: demo
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: pnpm Dependencies Cache
        uses: actions/cache@v5
        with:
          path: demo/node_modules
          key: ${{ runner.os }}-demo-pnpm-${{ hashFiles('demo/pnpm-lock.yaml') }}

      - name: Install Node Dependencies
        working-directory: demo
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Playwright Browser Cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('demo/pnpm-lock.yaml') }}

      - name: Install Playwright Browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: demo
        run: pnpm exec playwright install chromium

      - name: Install Playwright System Dependencies
        working-directory: demo
        run: pnpm exec playwright install-deps chromium

      - name: Prepare Environment
        working-directory: demo
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate

      - name: Publish Filament Assets
        working-directory: demo
        run: php artisan filament:assets

      - name: Build Vite Assets
        working-directory: demo
        run: pnpm build

      - name: Run Percy Snapshots
        working-directory: demo
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: pnpm exec percy exec --allowed-hostname "common.northwestern.edu" -- pnpm exec playwright test
